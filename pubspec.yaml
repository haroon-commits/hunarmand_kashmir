name: hunarmand_kashmir
description: Hunarmand Kashmir - Empowering Youth of the Valley with Digital Skills
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  smooth_page_indicator: ^1.1.0
  url_launcher: ^6.2.2
  flutter_svg: ^2.0.9
  animate_do: ^3.3.4
  percent_indicator: ^4.2.3
  carousel_slider: ^4.2.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: NotoColorEmoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji.ttf

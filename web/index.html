<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Hunarmand Kashmir - Empowering the youth of the valley with high-demand digital skills, AI mastery, and professional mentorship.">
  <meta name="keywords" content="Kashmir, Digital Skills, AI, Freelancing, Mirpur, Education, Hunarmand">

  <!-- Performance Optimization: Preconnect to Font Services -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Hunarmand Kashmir">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Hunarmand Kashmir | Empowering the Valley</title>
  <link rel="manifest" href="manifest.json">


  <style>
    body {
      background-color: #0D3320;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #0D3320;
      z-index: 99999;
      transition: opacity 0.4s ease-out;
    }

    .logo-img {
      height: 160px;
      margin-bottom: 0;
      opacity: 0;
      animation: fadeIn 1s ease-out forwards;
    }

    .tagline {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 2px;
      font-weight: 500;
      margin-top: 12px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeIn 1s ease-out forwards;
      animation-delay: 0.1s;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(245, 166, 35, 0.2);
      border-top: 3px solid #F5A623;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div id="loading-indicator">
    <img src="assets/images/main_logo.png" alt="Hunarmand Kashmir Logo" class="logo-img">
    <div class="tagline">Hunarmand Kashmir</div>
    <div class="spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Native Loader Cleanup: Ensures the premium HTML loader is removed 
    // as soon as the Flutter engine starts rendering (flt-glass-pane detected).
    (function () {
      var interval = setInterval(function () {
        if (document.querySelector('flt-glass-pane')) {
          var loader = document.getElementById('loading-indicator');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(function () {
              loader.remove();
            }, 400);
          }
          clearInterval(interval);
        }
      }, 100);
    })();
  </script>
</body>

</html>
